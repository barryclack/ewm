<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>成哥扫码器</title>
    <!-- 相机图标 favicon (SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='80' height='60' x='10' y='20' rx='12' fill='%23222'/%3E%3Ccircle cx='50' cy='50' r='18' fill='%23fff' stroke='%23222' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23333'/%3E%3Crect x='72' y='16' width='14' height='8' rx='3' fill='%23aaa'/%3E%3C/svg%3E">
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 36px;
            box-shadow: 0 25px 45px rgba(0,20,50,0.15);
            padding: 22px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            height: 98vh;
            max-height: 98vh;
            overflow: hidden;
            transition: all 0.2s;
        }

        h1 {
            font-size: 2rem;
            font-weight: 650;
            margin: 0 0 4px 0;
            color: #0a1a32;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        h1 span {
            background: #e9efff;
            color: #1d4ed8;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 40px;
            margin-left: 6px;
            border: 1px solid #ccdfff;
            white-space: nowrap;
        }

        .sub {
            color: #2c3e5c;
            margin-bottom: 16px;
            font-size: 0.98rem;
            border-left: 5px solid #2563eb;
            padding-left: 16px;
            background: #f8fafd;
            border-radius: 0 16px 16px 0;
            line-height: 1.4;
            flex-shrink: 0;
        }

        /* 记录头部 — 使用flex-wrap适应小屏 */
        .records-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            flex-shrink: 0;
            gap: 10px 8px;
            flex-wrap: wrap;
        }
        .records-header h3 {
            font-size: 1.45rem;
            font-weight: 630;
            color: #0b1e3a;
            white-space: nowrap;
        }
        .badge {
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 40px;
            padding: 5px 18px;
            font-size: 0.95rem;
            font-weight: 550;
            border: 1px solid #a9c5fe;
            white-space: nowrap;
        }
        /* 右侧按钮组 */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;  /* 靠右 */
        }
        .action-btn {
            background: white;
            border: 1.5px solid #bbcadd;
            color: #2d4059;
            font-size: 0.95rem;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.12s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .action-btn:hover {
            background: #ecf2fa;
            border-color: #8ba0c0;
            color: #0b1e3a;
        }
        .action-btn:active {
            background: #d9e2f0;
            transform: scale(0.96);
        }
        /* 相册按钮微调 */
        .album-btn {
            padding: 6px 18px;
        }

        #list {
            list-style: none;
            padding: 4px 6px;
            margin: 0 0 6px 0;
            overflow-y: auto;
            background: #f9fcff;
            border: 1px solid #e6edf6;
            border-radius: 24px;
            flex: 1 1 auto;
            min-height: 140px;
        }

        #list li {
            background: white;
            margin: 8px 10px;
            padding: 14px 18px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2ebf5;
            font-size: 0.98rem;
            word-break: break-all;
            transition: 0.08s;
        }
        #list li a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 550;
            display: inline-block;
            width: 100%;
        }
        #list li a:hover {
            text-decoration: underline;
            color: #2563eb;
        }
        #list li:has(a) {
            background: #edf5ff;
            border-color: #adc8ff;
        }

        #video-container {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #0b1424;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1), 0 15px 25px -8px rgba(0,0,0,0.5);
            margin: 6px 0 8px 0;
            position: relative;
            aspect-ratio: 4/3;
            display: none;
            flex-shrink: 0;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1a253b;
        }
        canvas {
            display: none;
        }
        .info-message {
            background: #e3f0ff;
            color: #004e9e;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1rem;
            margin: 4px 0 8px 0;
            text-align: center;
            border: 1px solid #b8d3ff;
            font-weight: 480;
            box-shadow: 0 2px 8px rgba(0,70,150,0.05);
            flex-shrink: 0;
            display: none;
        }

        .scan-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            flex-shrink: 0;
            width: 100%;
            gap: 6px;
        }

        .scan-btn {
            background: #0f2b5c;
            color: white;
            border: none;
            font-size: 1.8rem;
            font-weight: 600;
            padding: 18px 30px;
            border-radius: 70px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 12px 24px rgba(15,43,92,0.4);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.8px;
            touch-action: manipulation;
        }
        .scan-btn:hover {
            background: #1e3f7a;
            transform: scale(1.01);
            box-shadow: 0 16px 28px rgba(30,64,175,0.5);
        }
        .scan-btn:active {
            transform: scale(0.96);
            background: #0a1f44;
        }

        .footer-note {
            color: #5b6f8a;
            font-size: 0.82rem;
            text-align: center;
            padding: 4px 0 2px 0;
            border-top: 1px dashed #d0ddeb;
            width: 100%;
        }

        @media (max-width: 480px) {
            .card {
                padding: 16px 14px;
                border-radius: 30px;
            }
            h1 {
                font-size: 1.7rem;
            }
            .records-header {
                gap: 6px 4px;
            }
            .action-btn {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            .album-btn {
                padding: 6px 14px;
            }
            .scan-btn {
                font-size: 1.5rem;
                padding: 16px 20px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
<div class="card">
    <h1>📱 成哥扫码器 </h1>

    <!-- 记录头部 + 双按钮 (相册 + 清空) -->
    <div class="records-header">
        <h3>📋 扫描记录</h3>
        <span class="badge" id="recordCount">0</span>
        <div class="header-actions">
            <button class="action-btn album-btn" id="albumBtn">📷 相册</button>
            <button class="action-btn" id="clearBtn">清空</button>
        </div>
    </div>
    <ul id="list">
        <li style="color:#8a9bb5; justify-content:center; display: flex; ">📭 暂无记录</li>
    </ul>

    <div id="video-container">
        <video id="video" playsinline></video>
    </div>
    <div id="liveMessage" class="info-message"></div>

    <div class="scan-footer">
        <button class="scan-btn" id="scanBtn">🔎 开始扫码</button>
        <div class="footer-note">
            ✦ 点击按钮开启/关闭摄像头 ✦ 相册识别不干扰摄像头 ✦
        </div>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
(function() {
    // ---------- DOM 元素 ----------
    const scanBtn = document.getElementById('scanBtn');
    const albumBtn = document.getElementById('albumBtn');
    const videoContainer = document.getElementById('video-container');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const liveMessage = document.getElementById('liveMessage');
    const listEl = document.getElementById('list');
    const recordCountSpan = document.getElementById('recordCount');
    const clearBtn = document.getElementById('clearBtn');

    // ---------- 状态 ----------
    let stream = null;
    let scanning = false;          // 摄像头扫描中
    let rafId = null;
    let records = [];              // 存储顺序内容
    let recordsSet = new Set();    // 去重

    const canvasCtx = canvas.getContext('2d');

    // ---------- 通用函数 ----------
    function isUrl(str) {
        return /^https?:\/\//i.test(str);
    }

    // 更新列表UI
    function renderRecords() {
        recordCountSpan.textContent = records.length;

        if (records.length === 0) {
            listEl.innerHTML = '<li style="color:#8a9bb5; justify-content:center; display: flex; ">📭 暂无记录</li>';
            return;
        }

        const fragment = document.createDocumentFragment();
        records.forEach((text, index) => {
            const li = document.createElement('li');
            const numberedText = `${index + 1}. ${text}`;

            if (isUrl(text)) {
                const a = document.createElement('a');
                a.href = text;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = numberedText;
                li.appendChild(a);
            } else {
                li.textContent = numberedText;
            }
            fragment.appendChild(li);
        });
        listEl.innerHTML = '';
        listEl.appendChild(fragment);
    }

    // 显示短暂提示 (用liveMessage)
    function flashMessage(msg, isSuccess = true, duration = 2600) {
        liveMessage.style.display = 'block';
        liveMessage.textContent = msg;
        if (isSuccess) {
            liveMessage.style.background = '#dcfce7';
            liveMessage.style.color = '#166534';
        } else {
            liveMessage.style.background = '#fee2e2';
            liveMessage.style.color = '#991b1b';
        }
        setTimeout(() => {
            if (liveMessage) liveMessage.style.display = 'none';
        }, duration);
    }

    // ---------- 核心：添加记录 (去重、渲染、提示) ----------
    /**
     * 添加一条记录到列表
     * @param {string} raw 原始扫描内容
     * @returns {boolean} 是否真正添加 (true=新记录, false=空/重复)
     */
    function addRecord(raw) {
        const trimmed = (raw || '').trim();
        if (trimmed === '') {
            alert('⚠️ 二维码内容为空，已忽略');
            return false;
        }

        if (recordsSet.has(trimmed)) {
            alert('⏸️ 重复扫码，未记录:\n' + trimmed);
            return false;
        }

        // 添加新记录
        records.push(trimmed);
        recordsSet.add(trimmed);
        renderRecords();

        // 成功提示
        flashMessage('✅ 已记录: ' + (trimmed.length > 35 ? trimmed.slice(0,35)+'…' : trimmed), true);
        return true;
    }

    // ---------- 摄像头停止 ----------
    function stopScan() {
        if (rafId) {
            cancelAnimationFrame(rafId);
            rafId = null;
        }
        scanning = false;

        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
            video.srcObject = null;
        }

        videoContainer.style.display = 'none';
        liveMessage.style.display = 'none';
    }

    // ---------- 摄像头扫描结果处理 (扫到即停) ----------
    function handleCameraResult(rawData) {
        stopScan();   // 无论结果如何，关闭摄像头

        const trimmed = (rawData || '').trim();
        if (trimmed === '') {
            alert('⚠️ 二维码内容为空');
            return;
        }

        if (recordsSet.has(trimmed)) {
            alert('⏸️ 重复扫码，未记录:\n' + trimmed);
            return;
        }

        // 添加记录
        records.push(trimmed);
        recordsSet.add(trimmed);
        renderRecords();
        flashMessage('✅ 已记录: ' + (trimmed.length > 35 ? trimmed.slice(0,35)+'…' : trimmed), true);
    }

    // ---------- 扫描帧循环 (仅摄像头) ----------
    function scanFrame() {
        if (!scanning) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const vidWidth = video.videoWidth;
            const vidHeight = video.videoHeight;

            if (vidWidth > 0 && vidHeight > 0) {
                let targetWidth = vidWidth;
                let targetHeight = vidHeight;
                const MAX_DIM = 1280;
                if (targetWidth > MAX_DIM) {
                    targetHeight = Math.floor(targetHeight * MAX_DIM / targetWidth);
                    targetWidth = MAX_DIM;
                }
                if (targetHeight > MAX_DIM) {
                    targetWidth = Math.floor(targetWidth * MAX_DIM / targetHeight);
                    targetHeight = MAX_DIM;
                }

                if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                }

                canvasCtx.drawImage(video, 0, 0, vidWidth, vidHeight, 0, 0, targetWidth, targetHeight);
                const imageData = canvasCtx.getImageData(0, 0, targetWidth, targetHeight);

                const code = jsQR(imageData.data, targetWidth, targetHeight, {
                    inversionAttempts: 'attemptBoth'
                });

                if (code) {
                    console.log('二维码解码成功:', code.data);
                    handleCameraResult(code.data);
                    return;  // handleCameraResult 已调用 stopScan
                }
            }
        }

        if (scanning) {
            rafId = requestAnimationFrame(scanFrame);
        }
    }

    // ---------- 切换摄像头 (开始/停止) ----------
    async function toggleScan() {
        if (scanning) {
            stopScan();
            flashMessage('⏹️ 摄像头已关闭', false, 1500);
            return;
        }

        // 关闭之前的残余，重新开始
        stopScan();

        videoContainer.style.display = 'block';
        liveMessage.style.display = 'block';
        liveMessage.textContent = '⏳ 请求摄像头...';
        liveMessage.style.background = '#fff4d9';
        liveMessage.style.color = '#7a5d00';

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });

            video.srcObject = stream;
            await video.play();

            liveMessage.textContent = '🔍 摄像头已开启，对准二维码 (识别中...)';
            liveMessage.style.background = '#d4e6ff';
            liveMessage.style.color = '#004080';

            scanning = true;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(scanFrame);

        } catch (err) {
            console.error('摄像头错误:', err);
            let errorMsg = err.message || '';
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                errorMsg = '摄像头权限被拒绝。请在浏览器设置中允许。';
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                errorMsg = '未检测到摄像头设备。';
            } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                errorMsg = '摄像头正被其他应用占用，请关闭后重试。';
            } else {
                errorMsg = '无法访问摄像头: ' + (errorMsg || '未知错误');
            }
            liveMessage.style.background = '#ffe3e3';
            liveMessage.style.color = '#b91c1c';
            liveMessage.textContent = '❌ ' + errorMsg;
            videoContainer.style.display = 'none';
            stopScan(); // 确保状态清理
        }
    }

    // ---------- 相册识别 (从图片解码) ----------
    function handleAlbumImage() {
        // 创建临时 file input
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.style.display = 'none';
        document.body.appendChild(input); // 添加到body才能触发

        input.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                document.body.removeChild(input);
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const dataUrl = event.target.result;

                const img = new Image();
                img.onload = () => {
                    // 创建临时canvas (避免与摄像头冲突)
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');

                    // 控制图片最大尺寸
                    let width = img.width;
                    let height = img.height;
                    const MAX_DIM = 1280;
                    if (width > MAX_DIM) {
                        height = Math.floor(height * MAX_DIM / width);
                        width = MAX_DIM;
                    }
                    if (height > MAX_DIM) {
                        width = Math.floor(width * MAX_DIM / height);
                        height = MAX_DIM;
                    }

                    tempCanvas.width = width;
                    tempCanvas.height = height;
                    tempCtx.drawImage(img, 0, 0, width, height);

                    const imageData = tempCtx.getImageData(0, 0, width, height);
                    const code = jsQR(imageData.data, width, height, {
                        inversionAttempts: 'attemptBoth'
                    });

                    if (code) {
                        // 成功解码，使用addRecord (不关闭摄像头)
                        const added = addRecord(code.data);
                        if (!added) {
                            // 重复或空已在addRecord中弹窗，此处无需额外处理
                        }
                    } else {
                        alert('❌ 图片中未识别到二维码');
                    }

                    // 清理临时input
                    document.body.removeChild(input);
                };
                img.src = dataUrl;
            };
            reader.readAsDataURL(file);
        });

        // 确保即使点击取消也能移除input
        input.addEventListener('cancel', function() {
            document.body.removeChild(input);
        });

        input.click(); // 打开文件选择器
    }

    // ---------- 事件绑定 ----------
    scanBtn.addEventListener('click', toggleScan);

    albumBtn.addEventListener('click', function() {
        // 如果当前有扫描，不影响，直接打开相册
        handleAlbumImage();
    });

    clearBtn.addEventListener('click', () => {
        if (records.length === 0) {
            alert('记录已经是空的');
            return;
        }
        records = [];
        recordsSet.clear();
        renderRecords();
        liveMessage.style.display = 'none';
    });

    window.addEventListener('beforeunload', () => {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        if (rafId) cancelAnimationFrame(rafId);
    });

    // 初始化
    renderRecords();
})();
</script>
</body>
</html>
